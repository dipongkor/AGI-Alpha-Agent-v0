name: "📊 Test Coverage"

# This workflow runs the test suite and collects coverage information.
# It must be triggered manually via the "Run workflow" button and
# executes only when the GitHub actor matches the repository owner.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  owner-check:
    name: "Verify owner"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/ensure-owner

  coverage:
    needs: owner-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: 'pip'
          cache-dependency-path: 'requirements.lock'

      - name: Install dependencies
        run: |
          python check_env.py --auto-install${WHEELHOUSE:+ --wheelhouse "$WHEELHOUSE"}

      - name: Run pytest with coverage
        run: |
          pytest --cov --cov-report=xml:coverage.xml --cov-report=term --cov-fail-under=80

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-xml
          path: coverage.xml

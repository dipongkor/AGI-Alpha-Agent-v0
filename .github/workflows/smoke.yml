name: "🔥 Smoke Test"

on:
  workflow_dispatch:
    inputs:
      run_token:
        description: 'Authorization token for maintainers'
        required: false

permissions:
  contents: read

env:
  PYTHON_VERSION_MATRIX: "3.11,3.12,3.13"
  AGIALPHA_ADDRESS: "0xa61a3b3a130a9c20768eebf97e21515a6046a1fa"
  AGIALPHA_DECIMALS: 18

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check dispatch token
        if: github.actor != github.repository_owner && github.actor != 'github-actions[bot]'
        run: |
          if [ "${{ github.event.inputs.run_token }}" != "${{ secrets.DISPATCH_TOKEN }}" ]; then
            echo "Unauthorized"
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 'requirements.lock'

      - name: Verify $AGIALPHA configuration
        run: python scripts/check_agialpha_config.py

      - name: Cache pre-commit
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .cache/pre-commit
          key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-precommit-
      - name: Prepare build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            pip install -r requirements-dev.txt
          fi
      - name: Install pre-commit
        if: matrix.python-version == '3.11'
        run: pip install pre-commit==4.2.0
        env:
          PRE_COMMIT_HOME: .cache/pre-commit
      - name: Run pre-commit checks
        if: matrix.python-version == '3.11'
        run: |
          from_ref="${{ github.event.before }}"
          if [ -n "$from_ref" ] && git rev-parse --verify "$from_ref^{commit}" >/dev/null 2>&1; then
            pre-commit run --from-ref "$from_ref" --to-ref "${{ github.sha }}"
          else
            echo "::notice::Falling back to pre-commit --all-files (missing or unreachable from_ref)."
            pre-commit run --all-files
          fi
        env:
          PRE_COMMIT_HOME: .cache/pre-commit
          SKIP: eslint-insight-browser
      - name: Run smoke tests
        if: matrix.python-version == '3.11'
        run: |
          pytest tests/test_ping_agent.py tests/test_af_requests.py \
            --cov --cov-report=xml --cov-fail-under=80
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
      - name: Run 2-year simulation
        run: |
          python -m alpha_factory_v1.demos.alpha_agi_insight_v1.src.interface.cli simulate \
            --horizon 2 --sectors 1 --pop-size 1 --generations 1 --offline --no-broadcast \
            | tee sim.log
          grep -qi "year" sim.log
          test -f "$AGI_INSIGHT_LEDGER_PATH"
        env:
          AGI_INSIGHT_LEDGER_PATH: ${{ runner.temp }}/audit.db
          AGI_INSIGHT_OFFLINE: "1"
          OPENAI_API_KEY: ""

      - name: Verify ledger output
        run: |
          grep -qi year "$AGI_INSIGHT_LEDGER_PATH" || true
          sqlite3 "$AGI_INSIGHT_LEDGER_PATH" 'SELECT COUNT(*) FROM messages;' | grep -q "^[1-9]"
        env:
          AGI_INSIGHT_LEDGER_PATH: ${{ runner.temp }}/audit.db

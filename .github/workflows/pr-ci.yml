name: "✅ PR CI"

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  AGIALPHA_ADDRESS: "0xa61a3b3a130a9c20768eebf97e21515a6046a1fa"
  AGIALPHA_DECIMALS: 18

jobs:
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Free disk space
        run: bash scripts/ci_free_disk.sh
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
      - name: Verify $AGIALPHA configuration
        run: python scripts/check_agialpha_config.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Ruff check
        run: python scripts/ruff_targets.py --run

  smoke:
    name: "Smoke tests"
    if: ${{ always() }}
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Free disk space
        run: bash scripts/ci_free_disk.sh
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
      - name: Verify $AGIALPHA configuration
        run: python scripts/check_agialpha_config.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.lock
      - name: Run smoke tests
        run: |
          pytest -m smoke \
            tests/test_af_requests.py \
            tests/test_cache_version.py \
            tests/test_check_env_core.py \
            tests/test_check_env_network.py \
            tests/test_config_settings.py \
            tests/test_config_utils.py \
            tests/test_ping_agent.py -q

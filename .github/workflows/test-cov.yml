name: "📊 Test Coverage pr-3172731620"

# This workflow runs the test suite and collects coverage information.
# It runs automatically on every push to any branch, and can also be
# triggered manually via the "Run workflow" button. The owner-check
# job gates execution to the repository owner.

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: 'requirements.lock'

      # Branch names can contain slashes (e.g. feature/foo), which are
      # invalid in filenames. Replace any non-alphanumeric/dash/underscore
      # character with a dash so the resulting name is filesystem-safe.
      - name: Compute safe branch name
        id: branch
        shell: bash
        run: |
          safe_name="${GITHUB_REF_NAME//\//-}"
          safe_name="${safe_name//[^a-zA-Z0-9._-]/-}"
          echo "SAFE_BRANCH=$safe_name" >> "$GITHUB_ENV"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Install pinned runtime deps first so later steps work from a known
      # baseline. If requirements.lock is missing on this branch, skip it.
      - name: Install locked runtime dependencies
        run: |
          if [ -f requirements.lock ]; then
            python -m pip install -r requirements.lock
          else
            echo "::notice::requirements.lock not present; skipping."
          fi

      # Dev deps (pytest, linters, typically pytest-cov). Skip if missing.
      - name: Install dev dependencies
        run: |
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          else
            echo "::notice::requirements-dev.txt not present; skipping."
          fi

      # Guarantee coverage tooling exists regardless of what the branch's
      # requirements files happen to contain.
      - name: Install coverage tooling
        run: python -m pip install pytest-cov "coverage[toml]"

      # Run the project's env checker last so it can repair any version
      # mismatches introduced by the steps above (e.g. stale
      # typing_extensions pulled in by a lockfile).
      - name: Verify and repair environment
        run: |
          python check_env.py --auto-install${WHEELHOUSE:+ --wheelhouse "$WHEELHOUSE"}

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov \
            --cov-report=xml:"${SAFE_BRANCH}.xml" \
            --cov-report=json:"${SAFE_BRANCH}.json" \
            --cov-report=term \
            --junitxml="${SAFE_BRANCH}-junit.xml"

      - name: Upload coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports-${{ env.SAFE_BRANCH }}
          path: |
            ${{ env.SAFE_BRANCH }}.xml
            ${{ env.SAFE_BRANCH }}.json
            ${{ env.SAFE_BRANCH }}-junit.xml
name: "📊 Test Coverage pr-3172731620"

# Builds the project Dockerfile and runs pytest with coverage inside
# the container. The repository is mounted into the container so the
# test suite (not copied in by the Dockerfile) is available at runtime.
#
# Runs on every push to any branch, and can also be triggered manually.

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Branch names can contain slashes (e.g. feature/foo), which are
      # invalid in filenames. Replace any non-alphanumeric/dash/underscore
      # character with a dash so the resulting name is filesystem-safe.
      - name: Compute safe branch name
        id: branch
        shell: bash
        run: |
          safe_name="${GITHUB_REF_NAME//\//-}"
          safe_name="${safe_name//[^a-zA-Z0-9._-]/-}"
          echo "SAFE_BRANCH=$safe_name" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image locally (no push). Use GHA cache so repeat runs
      # on the same branch don't reinstall Node, pnpm, and pip deps from
      # scratch every time.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: coverage-image:${{ env.SAFE_BRANCH }}
          load: true
          push: false
          cache-from: type=gha,scope=coverage-${{ env.SAFE_BRANCH }}
          cache-to: type=gha,scope=coverage-${{ env.SAFE_BRANCH }},mode=max

      # The Dockerfile only copies the Insight demo into the image.
      # Mount the full repo at /repo and run tests from there. Install
      # coverage tooling inside the container at runtime since the
      # Dockerfile does not include it.
      #
      # --user root is needed because the Dockerfile switches to a
      # non-root 'appuser' which cannot pip-install into site-packages.
      - name: Run pytest with coverage inside container
        run: |
          docker run --rm \
            --user root \
            -v "$PWD":/repo \
            -w /repo \
            -e SAFE_BRANCH="$SAFE_BRANCH" \
            coverage-image:${{ env.SAFE_BRANCH }} \
            bash -c '
              set -e
              pip install --no-cache-dir pytest-cov "coverage[toml]"
              pytest \
                --cov \
                --cov-report=xml:"${SAFE_BRANCH}.xml" \
                --cov-report=json:"${SAFE_BRANCH}.json" \
                --cov-report=term \
                --junitxml="${SAFE_BRANCH}-junit.xml"
            '

      - name: Upload coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports-${{ env.SAFE_BRANCH }}
          path: |
            ${{ env.SAFE_BRANCH }}.xml
            ${{ env.SAFE_BRANCH }}.json
            ${{ env.SAFE_BRANCH }}-junit.xml
name: "📊 Diff Coverage"

# Builds the project Dockerfile and runs pytest with coverage inside
# the container. Computes diff coverage against upstream/main so the
# output tells you: "of the lines this PR changed, what % are covered."
#
# If the PR branch's lockfile is broken, we temporarily swap in main's
# lockfile so the image can actually build.

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_URL: "https://github.com/MontrealAI/AGI-Alpha-Agent-v0.git"
  UPSTREAM_BASE: "main"

jobs:
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute safe branch name
        shell: bash
        run: |
          safe_name="${GITHUB_REF_NAME//\//-}"
          safe_name="${safe_name//[^a-zA-Z0-9._-]/-}"
          echo "SAFE_BRANCH=$safe_name" >> "$GITHUB_ENV"

      - name: Fetch upstream base for diff
        run: |
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null || true
          git fetch upstream "$UPSTREAM_BASE"

      # Use upstream main's lockfile instead of the PR branch's, which
      # may be broken. We swap in-place but don't commit; it only exists
      # for the duration of this job.
      - name: Swap in upstream's lockfile
        run: |
          git show upstream/${UPSTREAM_BASE}:alpha_factory_v1/demos/alpha_agi_insight_v1/requirements.lock \
            > alpha_factory_v1/demos/alpha_agi_insight_v1/requirements.lock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: coverage-image:${{ env.SAFE_BRANCH }}
          load: true
          push: false
          cache-from: type=gha,scope=coverage-${{ env.SAFE_BRANCH }}
          cache-to: type=gha,scope=coverage-${{ env.SAFE_BRANCH }},mode=max

      - name: Run pytest with coverage inside container
        run: |
          docker run --rm \
            --user root \
            -v "$PWD":/repo \
            -w /repo \
            -e SAFE_BRANCH="$SAFE_BRANCH" \
            coverage-image:${{ env.SAFE_BRANCH }} \
            bash -c '
              set -e
              pip install --no-cache-dir pytest-cov "coverage[toml]" diff-cover
              pytest \
                --cov \
                --cov-report=xml:"${SAFE_BRANCH}.xml" \
                --cov-report=json:"${SAFE_BRANCH}.json" \
                --cov-report=term \
                --junitxml="${SAFE_BRANCH}-junit.xml" || true
            '

      - name: Compute diff coverage
        run: |
          python -m pip install diff-cover
          diff-cover "${SAFE_BRANCH}.xml" \
            --compare-branch="upstream/${UPSTREAM_BASE}" \
            --html-report "${SAFE_BRANCH}-diff-cov.html" \
            --json-report "${SAFE_BRANCH}-diff-cov.json" \
            --markdown-report "${SAFE_BRANCH}-diff-cov.md" || true

      - name: Upload coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports-${{ env.SAFE_BRANCH }}
          path: |
            ${{ env.SAFE_BRANCH }}.xml
            ${{ env.SAFE_BRANCH }}.json
            ${{ env.SAFE_BRANCH }}-junit.xml
            ${{ env.SAFE_BRANCH }}-diff-cov.html
            ${{ env.SAFE_BRANCH }}-diff-cov.json
            ${{ env.SAFE_BRANCH }}-diff-cov.md
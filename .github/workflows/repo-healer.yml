name: "🩹 Repo-Healer v1"

on:
  workflow_run:
    workflows:
      - "🚀 Integration CI — Insight Demo"
      - "✅ PR CI"
      - "🔥 Smoke Test"
      - "📚 Docs"
    types: [completed]
  workflow_dispatch:
    inputs:
      apply-after-attempt:
        description: "Minimum run attempt before AUTOPATCH_SAFE apply mode is allowed"
        required: false
        default: "2"

permissions:
  contents: read
  actions: read

jobs:
  triage-and-report:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install Repo-Healer runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Build structured failure bundle
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO_HEALER_APPLY_AFTER_ATTEMPT: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs['apply-after-attempt']) || vars.REPO_HEALER_APPLY_AFTER_ATTEMPT || '2' }}
        run: |
          python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.ci_bundle \
            --event-path "$GITHUB_EVENT_PATH" \
            --repository "$GITHUB_REPOSITORY" \
            --token "$GITHUB_TOKEN" \
            --bundle-out repo_healer_bundle.json \
            --candidates-out repo_healer_candidates.json

      - name: Run Repo-Healer
        run: |
          MODE=$(python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          bundle = json.loads(Path("repo_healer_bundle.json").read_text(encoding="utf-8"))
          support_mode = bundle.get("support_mode", "AUTOPATCH_SAFE")
          run_attempt = int(bundle.get("run_attempt", 1))
          raw_threshold = os.getenv("REPO_HEALER_APPLY_AFTER_ATTEMPT", "2") or "2"
          try:
              apply_after_attempt = int(raw_threshold)
          except ValueError:
              print(
                  f"invalid REPO_HEALER_APPLY_AFTER_ATTEMPT={raw_threshold!r}; using default 2",
                  file=sys.stderr,
              )
              apply_after_attempt = 2
          if apply_after_attempt < 1:
              print(
                  f"non-positive REPO_HEALER_APPLY_AFTER_ATTEMPT={apply_after_attempt}; clamping to 1",
                  file=sys.stderr,
              )
              apply_after_attempt = 1
          if support_mode != "AUTOPATCH_SAFE":
              print("REPORT_ONLY")
          elif run_attempt < apply_after_attempt:
              print("DRY_RUN")
          else:
              print("APPLY")
          PY
          )

          if [ "$MODE" = "REPORT_ONLY" ]; then
            python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
              --repo . \
              --failure-bundle repo_healer_bundle.json \
              --candidates repo_healer_candidates.json \
              --report repo_healer_report.json \
              --report-only
          elif [ "$MODE" = "DRY_RUN" ]; then
            set +e
            python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
              --repo . \
              --failure-bundle repo_healer_bundle.json \
              --candidates repo_healer_candidates.json \
              --report repo_healer_report.json \
              --dry-run
            dry_run_rc=$?
            set -e

            if [ "$dry_run_rc" -ne 0 ]; then
              echo "::warning::Repo-Healer dry-run found no safe candidate; emitting report-only diagnosis artifact."
              python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
                --repo . \
                --failure-bundle repo_healer_bundle.json \
                --candidates repo_healer_candidates.json \
                --report repo_healer_report.json \
                --report-only
            fi
          else
            set +e
            python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
              --repo . \
              --failure-bundle repo_healer_bundle.json \
              --candidates repo_healer_candidates.json \
              --report repo_healer_report.json
            apply_rc=$?
            set -e

            if [ "$apply_rc" -ne 0 ]; then
              echo "::warning::Repo-Healer apply-mode found no safe candidate; emitting report-only diagnosis artifact."
              python -m alpha_factory_v1.demos.self_healing_repo.repo_healer_v1.cli \
                --repo . \
                --failure-bundle repo_healer_bundle.json \
                --candidates repo_healer_candidates.json \
                --report repo_healer_report.json \
                --report-only
            fi
          fi
        env:
          REPO_HEALER_APPLY_AFTER_ATTEMPT: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs['apply-after-attempt']) || vars.REPO_HEALER_APPLY_AFTER_ATTEMPT || '2' }}

      - name: Upload repo-healer artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: repo-healer-v1-report
          path: |
            repo_healer_bundle.json
            repo_healer_candidates.json
            repo_healer_report.json

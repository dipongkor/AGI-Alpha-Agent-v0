# Build and commit the Insight docs bundle whenever related sources change.
# Detects the appropriate build script, regenerates docs/alpha_agi_insight_v1/insight.bundle.js,
# and auto-commits updated artifacts back to the repository.
name: build-insight-bundle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/alpha_agi_insight_v1/**'
      - 'alpha_factory_v1/demos/alpha_agi_insight_v1/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'rollup.config.*'
      - 'webpack.config.*'

jobs:
  build-insight-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      INSIGHT_BROWSER_DIR: alpha_factory_v1/demos/alpha_agi_insight_v1/insight_browser_v1
      DOCS_BUNDLE_DIR: docs/alpha_agi_insight_v1
      FETCH_ASSETS_DIR: ${{ github.workspace }}/.tmp/insight-assets
      INSIGHT_ASSET_ROOT: ${{ github.workspace }}/.tmp/insight-assets
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.npm-cache/insight-bundle
      NPM_CONFIG_FUND: 'false'
      NPM_CONFIG_AUDIT: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 22.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ${{ env.INSIGHT_BROWSER_DIR }}/package-lock.json

      - name: Configure npm
        run: |
          npm config set fund false
          npm config set audit false

      - name: Install dependencies
        run: |
          rm -rf "${{ env.INSIGHT_BROWSER_DIR }}/node_modules"
          npm ci
        working-directory: ${{ env.INSIGHT_BROWSER_DIR }}

      - name: Detect docs build script
        id: build-script
        run: |
          python "$GITHUB_WORKSPACE/scripts/select_insight_build_script.py"             --package-json "$GITHUB_WORKSPACE/${{ env.INSIGHT_BROWSER_DIR }}/package.json"             --github-output "$GITHUB_OUTPUT"

      - name: Build Insight bundle
        run: npm run ${{ steps.build-script.outputs.script }}
        working-directory: ${{ env.INSIGHT_BROWSER_DIR }}
        env:
          FETCH_ASSETS_SKIP_LLM: '1'

      - name: Sync built assets into docs bundle directory
        run: |
          mkdir -p "$GITHUB_WORKSPACE/${{ env.DOCS_BUNDLE_DIR }}"
          rsync -av --delete \
            --exclude='*.wasm' \
            --exclude='*.zip' \
            --exclude='*.gz' \
            --exclude='*.png' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            --exclude='*.webp' \
            --exclude='*.gif' \
            --exclude='*.pdf' \
            --exclude='*.ico' \
            --exclude='*.mp3' \
            --exclude='*.mp4' \
            --exclude='*.woff' \
            --exclude='*.woff2' \
            --exclude='*.ttf' \
            --exclude='*.otf' \
            --exclude='*.bin' \
            --exclude='*.exe' \
            --exclude='*.dll' \
            --exclude='*.so' \
            --exclude='*.dylib' \
            --exclude='assets/wasm/**' \
            --exclude='assets/wasm_llm/**' \
            --exclude='assets/pyodide/**' \
            "${GITHUB_WORKSPACE}/${{ env.INSIGHT_BROWSER_DIR }}/dist/" "$GITHUB_WORKSPACE/${{ env.DOCS_BUNDLE_DIR }}/"

      - name: Commit regenerated bundle
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: auto-regenerate docs Insight bundle"
          file_pattern: docs/alpha_agi_insight_v1/**
